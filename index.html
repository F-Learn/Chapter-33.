<script>
    // Chapter 33: Assessment and Management of Patients with Allergic Disorders – 39 questions (exact from document)
    const questions = [
        {
            id: 1,
            question: "1. A client received a bee sting on the lip approximately 2 hours ago and has arrived at an urgent/walk-in clinic for treatment because the swelling is now accompanied by nasal congestion. On assessment, the client reports pruritus and a sensation of warmth at the site. Which degree of anaphylaxis is the client experiencing?",
            options: [
                "A. No systemic reaction",
                "B. Moderate systemic reaction",
                "C. Severe systemic reaction",
                "D. Mild systemic reaction"
            ],
            correct: 3, // D
            rationale: "Mild systemic reactions begin within the first 2 hours after the exposure, and consist of cluster tingling and a sensation of warmth. Nasal congestion, periorbital swelling, pruritus, sneezing, and tearing of the eyes is expected. While onset timing is the same, moderate systemic reactions include bronchospasm, edema of the airways or larynx with dyspnea, cough, and wheezing. Severe systemic reactions have an abrupt onset with symptoms progressing rapidly to bronchospasm, laryngeal edema, severe dyspnea, cyanosis, and hypotension. Severe systemic reaction should be considered as an emergent situation. A systemic reaction occurred as a vector (the bee sting) and a reaction (signs/symptoms) resulted. (PTS:1 REF:p.1046)"
        },
        {
            id: 2,
            question: "2. A client with a family history of allergies has experienced an allergic response based on a genetic predisposition. This atopic response is usually mediated by which immunoglobulin (Ig)?",
            options: [
                "A. IgA",
                "B. IgM",
                "C. IgG",
                "D. IgE"
            ],
            correct: 3, // D
            rationale: "Atopy refers to allergic reactions characterized by the action of IgE antibodies and a genetic predisposition to allergic reactions. IgE (0.004% of total Ig) appears in serum; takes part in allergic and some hypersensitivity reactions; and combats parasitic infections. IgA (15% of total Ig) appears in body fluids (blood, saliva, tears, and breast milk, as well as pulmonary, gastrointestinal, prostatic, and vaginal secretions); protects against respiratory, gastrointestinal, and genitourinary infections; prevents absorption of antigens from food; and passes to neonate in breast milk for protection. IgM (10% of total Ig) appears mostly in intravascular serum; appears as the first Ig produced in response to bacterial and viral infections; and activates the complement system. IgG (75% of total Ig) appears in serum and tissues (interstitial fluid); assumes a major role in bloodborne and tissue infections; activates the complement system; enhances phagocytosis; and crosses the placenta. (PTS:1 REF:p.1039)"
        },
        {
            id: 3,
            question: "3. An office worker eats a cookie that contains peanut butter. The worker begins wheezing, with an inspiratory stridor and air hunger, and the occupational health nurse is called to the office. The nurse should recognize that the worker is likely suffering from which type of hypersensitivity?",
            options: [
                "A. Anaphylactic (type 1)",
                "B. Cytotoxic (type II)",
                "C. Immune complex (type III)",
                "D. Delayed-type (type IV)"
            ],
            correct: 0, // A
            rationale: "The most severe form of a hypersensitivity reaction is anaphylaxis. An unanticipated severe allergic reaction that is often explosive in onset, anaphylaxis is characterized by edema in many tissues, including the larynx, and is often accompanied by hypotension, bronchospasm, and cardiovascular collapse in severe cases. Type II, or cytotoxic, hypersensitivity occurs when the system mistakenly identifies a normal constituent of the body as foreign. Immune complex (type III) hypersensitivity involves immune complexes formed when antigens bind to antibodies. Type III is associated with systemic lupus erythematosus, rheumatoid arthritis, certain types of nephritis, and bacterial endocarditis. Delayed-type (type IV), also known as cellular hypersensitivity, occurs 24 to 72 hours after exposure to an allergen. (PTS:1 REF:p.1046)"
        },
        {
            id: 4,
            question: "4. A client is learning about a new diagnosis of asthma with the asthma nurse. What medication will best prevent the onset of acute asthma exacerbations?",
            options: [
                "A. Diphenhydramine",
                "B. Montelukast",
                "C. Albuterol sulfate",
                "D. Epinephrine"
            ],
            correct: 1, // B
            rationale: "Many manifestations of inflammation can be attributed in part to leukotrienes. Medications categorized as leukotriene antagonists or modifiers such as montelukast block the synthesis or action of leukotrienes and prevent signs and symptoms associated with asthma. Diphenhydramine prevents histamine's effect on smooth muscle. Albuterol sulfate relaxes smooth muscle during an asthma attack. Epinephrine relaxes bronchial smooth muscle but is not used on a preventative basis. (PTS:1 REF:p.1052)"
        },
        {
            id: 5,
            question: "5. A nurse is preparing a client for allergy skin testing. What precautionary step is most important for the nurse to follow?",
            options: [
                "A. The client must not have received an immunization within 7 days.",
                "B. The nurse should administer albuterol 30 to 45 minutes prior to the test.",
                "C. Prophylactic epinephrine should be given before the test.",
                "D. Emergency equipment should be readily available."
            ],
            correct: 3, // D
            rationale: "Emergency equipment must be readily available during testing to treat anaphylaxis. Immunizations do not contraindicate testing. Neither epinephrine nor albuterol is given prior to testing. (PTS:1 REF:p.1044)"
        },
        {
            id: 6,
            question: "6. A client is scheduled for a skin test. The client informs the nurse that the client used a corticosteroid earlier today to alleviate allergy symptoms. Which nursing intervention should the nurse implement?",
            options: [
                "A. Note the corticosteroid use in the electronic health record and continue with the test.",
                "B. Modify the skin test to check for grass, mold, or dust allergies only.",
                "C. Administer sodium valproate to reverse the effects of corticosteroid usage.",
                "D. Cancel and reschedule the skin test when the client stops taking the corticosteroid."
            ],
            correct: 3, // D
            rationale: "Corticosteroids and antihistamines, including over-the-counter allergy medications, suppress skin test reactivity and should be stopped 48 to 96 hours before testing, depending on the duration of their activity. If the client takes one of these medications within this time frame, the nurse should cancel the skin test and reschedule for a time when the client is not taking it. The nurse should not continue with the test. The nurse should not modify the test. Administration of sodium valproate is used to reverse corticosteroid-induced mania, not to reverse it effects, in general. (PTS:1 REF:p.1045)"
        },
        {
            id: 7,
            question: "7. A client has developed severe contact dermatitis with burning, itching, cracking, and peeling of the skin on the client's hands. What should the nurse teach the client to do?",
            options: [
                "A. Wear powdered latex gloves when in public.",
                "B. Wash her hands with antibacterial soap every few hours.",
                "C. Maintain room temperature at 75 to 80°F (24° to 27°C) whenever possible.",
                "D. Keep the hands well moisturized at all times."
            ],
            correct: 3, // D
            rationale: "Powdered latex gloves can cause contact dermatitis. Skin should be kept well hydrated and should be washed with mild soap. Maintaining room temperature at 75 to 80°F (24° to 27°C) is excessively warm. (PTS:1 REF:p.1064)"
        },
        {
            id: 8,
            question: "8. A client with severe environmental allergies is scheduled for an immunotherapy injection. What should be included in teaching the client about this treatment?",
            options: [
                "A. The client will be given a low dose of epinephrine before the treatment.",
                "B. The client will remain in the clinic to be monitored for 30 minutes following the injection.",
                "C. Therapeutic failure occurs if the symptoms to the allergen do not decrease after 3 months.",
                "D. The allergen will be given by the peripheral intravenous (IV) route."
            ],
            correct: 1, // B
            rationale: "Although severe systemic reactions are rare, the risk of systemic and potentially fatal anaphylaxis exists. Because of this risk, the client must remain in the office or clinic for at least 30 minutes after the injection and is observed for possible systemic symptoms. Therapeutic failure is evident when a client does not experience a decrease in symptoms within 12 to 24 months. Epinephrine is not given prior to treatment and the IV route is not used. (PTS:1 REF:p.1053)"
        },
        {
            id: 9,
            question: "9. The nurse in an allergy clinic is educating a new client about the pathology of the client's health problem. What response should the nurse describe as a possible consequence of histamine release?",
            options: [
                "A. Constriction of small venules",
                "B. Contraction of bronchial smooth muscle",
                "C. Dilation of large blood vessels",
                "D. Decreased secretions from gastric and mucosal cells"
            ],
            correct: 1, // B
            rationale: "Histamine's effects during the immune response include contraction of bronchial smooth muscle, resulting in wheezing and bronchospasm, dilation of small venules, constriction of large blood vessels, and an increase in secretion of gastric and mucosal cells. (PTS:1 REF:p.1040)"
        },
        {
            id: 10,
            question: "10. The nurse is providing care for a client who has experienced a type I hypersensitivity reaction. Which client would have this type of reaction?",
            options: [
                "A. A client with an anaphylactic reaction after a bee sting",
                "B. A client with a skin reaction resulting from adhesive tape",
                "C. A client with a diagnosis of myasthenia gravis",
                "D. A client with rheumatoid arthritis"
            ],
            correct: 0, // A
            rationale: "Anaphylactic (type I) hypersensitivity is an immediate reaction mediated by immunoglobulin E antibodies and requires previous exposure to the specific antigen. Skin reactions are more commonly type IV, and myasthenia gravis is thought to be a type II reaction. Rheumatoid arthritis is not a type I hypersensitivity reaction. (PTS:1 REF:p.1041)"
        },
        {
            id: 11,
            question: "11. A nurse is caring for a client who has had an anaphylactic reaction after a bee sting. The nurse is providing client teaching prior to the client's discharge. In the event of an anaphylactic reaction, the nurse explains that the client should self-administer epinephrine at which site?",
            options: [
                "A. Forearm",
                "B. Thigh",
                "C. Deltoid muscle",
                "D. Abdomen"
            ],
            correct: 1, // B
            rationale: "The client is taught to position the device at the middle portion of the thigh and push the device into the thigh as far as possible. The device will automatically inject a premeasured dose of epinephrine into the subcutaneous tissue. The muscle of the lateral thigh is the best site to administer epinephrine because it is one of the largest muscles in the body and has significant blood flow, which allows more rapid absorption of the medication than in the smaller muscles in the forearm or shoulder (deltoid) or subcutaneously in the abdomen. (PTS:1 REF:p.1048)"
        },
        {
            id: 12,
            question: "12. A nurse has included the nursing diagnosis of Risk for Latex Allergy Response in a client's plan of care. The presence of which chronic health problem would most likely prompt this diagnosis?",
            options: [
                "A. Herpes simplex",
                "B. Human immunodeficiency virus (HIV)",
                "C. Spina bifida",
                "D. Hypogammaglobulinemia"
            ],
            correct: 2, // C
            rationale: "Clients with spina bifida are at a particularly high risk for developing a latex allergy. Clients with spina bifida are at high risk because they have had multiple surgeries, multiple urinary catheterization procedures, and other treatments involving use of latex products, and latex allergy develops as a result of repeated exposure to the proteins and polypeptides in natural rubber latex. Clients with herpes simplex, HIV, or hypogammaglobulinemia (decreased level of gamma immunoglobulins) are less likely than clients with spina bifida to have as many surgeries or other treatments that would expose them to latex. (PTS:1 REF:p.1062)"
        },
        {
            id: 13,
            question: "13. A client has been diagnosed with Stevens-Johnson syndrome. Which factors are common triggers of this condition? Select all that apply.",
            options: [
                "A. Tamoxifen and vemurafenib",
                "B. Exposure to cold objects, cold fluids, or cold air",
                "C. Allopurinol and nevirapine",
                "D. Wearing clothing washed in a detergent",
                "E. Radiation in combination with phenytoin"
            ],
            correct: [0,2,4], // A, C, E
            rationale: "Stevens-Johnson syndrome is a severe reaction commonly triggered by medication. The syndrome can evolve into extensive epidermal necrosis and become life-threatening. Among the many medications that trigger this condition are tamoxifen, vemurafenib, allopurinol and nevirapine. The combination of radiation and antiepileptic drugs such as phenytoin can also trigger this condition. Exposure to cold objects, cold fluids, or cold air can trigger cold urticaria, resulting in wheals (hives) or angioedema, but would not trigger Steven-Johnson syndrome. Wearing clothing washed in a detergent can trigger contact dermatitis but would not trigger Steven-Johnson syndrome. (PTS:1 REF:p.1058)"
        },
        {
            id: 14,
            question: "14. A client is undergoing testing for food allergies after experiencing unexplained signs and symptoms of hypersensitivity. Which food items would the nurse inform the client are common allergens?",
            options: [
                "A. Citrus fruits and rice",
                "B. Root vegetables and tomatoes",
                "C. Eggs and wheat",
                "D. Hard cheeses and vegetable oils"
            ],
            correct: 2, // C
            rationale: "The most common food allergens are seafood (lobster, shrimp, crab, clams, fin fish), peanuts, tree nuts, eggs, wheat, milk, and soy. Citrus fruits, rice, root vegetables, tomatoes, hard cheeses, and vegetable oils are not common allergens. (PTS:1 REF:p.1061)"
        },
        {
            id: 15,
            question: "15. A client has been admitted to the emergency department with signs of anaphylaxis following a bee sting. The nurse knows that if this is a true allergic reaction the client will present with what alteration in laboratory values?",
            options: [
                "A. Increased eosinophils",
                "B. Increased neutrophils",
                "C. Increased serum albumin",
                "D. Decreased blood glucose"
            ],
            correct: 0, // A
            rationale: "Higher percentages of eosinophils are considered moderate to severe eosinophilia. Moderate eosinophilia is defined as 15% to 40% eosinophils and is found in clients with allergic disorders. Hypersensitivity does not result in hypoglycemia or increased albumin and neutrophil counts. (PTS:1 REF:p.1041)"
        },
        {
            id: 16,
            question: "16. A nurse should prioritize and closely monitor a client for a potentially severe anaphylactic reaction after the client has received which medical intervention?",
            options: [
                "A. Measles-mumps-rubella vaccine",
                "B. Rapid administration of intravenous fluids",
                "C. Computed tomography with contrast solution",

    let currentQuestion = 0;
    let selectedOption = null;
    let answers = Array(questions.length).fill(null);

    function loadQuestion() {
        const q = questions[currentQuestion];
        if (!q) return;

        const progress = ((currentQuestion + 1) / questions.length) * 100;
        document.getElementById('progressBar').style.width = `${progress}%`;
        document.getElementById('counter').textContent = `${currentQuestion + 1}/${questions.length}`;
        document.getElementById('questionNumber').textContent = q.id;

        document.getElementById('question').innerHTML = q.question;
        loadOptions(q);

        document.getElementById('feedback').style.display = 'none';
        document.getElementById('rationale').classList.remove('show');
        document.getElementById('cancelBtn').classList.remove('show');

        document.getElementById('prevBtn').disabled = currentQuestion === 0;
        const stored = answers[q.id - 1];
        document.getElementById('nextBtn').disabled = stored === null || stored === undefined;
        document.getElementById('nextBtn').textContent = currentQuestion >= questions.length - 1 ? 'Finish ➡️' : 'Next ➡️';
    }

    function loadOptions(q) {
        const container = document.getElementById('options');
        container.innerHTML = '';
        q.options.forEach((opt, idx) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerHTML = `<div class="option-letter">${String.fromCharCode(65 + idx)}</div><div>${opt}</div>`;
            div.onclick = () => selectOption(idx);
            container.appendChild(div);
        });

        const saved = answers[q.id - 1];
        if (saved !== null && saved !== undefined) {
            selectOption(saved, true);
        }
    }

    function selectOption(index, fromMemory = false) {
        const q = questions[currentQuestion];
        if (!fromMemory && selectedOption !== null) return;

        if (!fromMemory) {
            selectedOption = index;
            answers[q.id - 1] = index;
        }

        highlightSelected(index, q);
        showFeedback(index, q);
        document.getElementById('nextBtn').disabled = false;
        document.getElementById('cancelBtn').classList.add('show');
    }

    function highlightSelected(index, q) {
        const opts = document.querySelectorAll('.option');
        opts.forEach((opt, i) => opt.classList.remove('correct', 'incorrect'));

        const correctIndices = Array.isArray(q.correct) ? q.correct : [q.correct];
        if (Array.isArray(q.correct)) {
            correctIndices.forEach(ci => opts[ci]?.classList.add('correct'));
            if (!correctIndices.includes(index)) {
                opts[index]?.classList.add('incorrect');
            }
        } else {
            if (index === q.correct) {
                opts[index].classList.add('correct');
            } else {
                opts[index].classList.add('incorrect');
                opts[q.correct].classList.add('correct');
            }
        }
    }

    function showFeedback(index, q) {
        const fb = document.getElementById('feedback');
        const icon = document.getElementById('feedbackIcon');
        const text = document.getElementById('feedbackText');
        const rationaleDiv = document.getElementById('rationale');
        const rationaleP = document.getElementById('rationaleText');

        const correctIndices = Array.isArray(q.correct) ? q.correct : [q.correct];
        const isCorrect = correctIndices.includes(index);

        if (isCorrect) {
            fb.className = 'feedback correct';
            icon.textContent = '✅';
            text.textContent = 'CORRECT! Well done.';
        } else {
            fb.className = 'feedback incorrect';
            icon.textContent = '❌';
            const letters = correctIndices.map(c => String.fromCharCode(65 + c)).join(', ');
            text.textContent = `INCORRECT. The correct answer(s): ${letters}`;
        }

        fb.style.display = 'flex';
        rationaleP.innerHTML = q.rationale;
        rationaleDiv.classList.add('show');
    }

    function cancelSelection() {
        const q = questions[currentQuestion];
        selectedOption = null;
        answers[q.id - 1] = null;
        document.querySelectorAll('.option').forEach(opt => opt.classList.remove('correct', 'incorrect'));
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('rationale').classList.remove('show');
        document.getElementById('cancelBtn').classList.remove('show');
        document.getElementById('nextBtn').disabled = true;
    }

    function nextCard() {
        if (currentQuestion < questions.length - 1) {
            currentQuestion++;
            selectedOption = null;
            loadQuestion();
        } else {
            currentQuestion = 0;
            loadQuestion();
        }
    }

    function previousCard() {
        if (currentQuestion > 0) {
            currentQuestion--;
            const q = questions[currentQuestion];
            selectedOption = answers[q.id - 1];
            loadQuestion();
        }
    }

    // keyboard shortcuts
    document.addEventListener('keydown', function(e) {
        if (e.key >= '1' && e.key <= '4') selectOption(parseInt(e.key)-1);
        else if (e.key >= 'a' && e.key <= 'd') selectOption(e.key.charCodeAt(0)-97);
        else if (e.key >= 'A' && e.key <= 'D') selectOption(e.key.charCodeAt(0)-65);
        else if (e.key === 'ArrowLeft' && !document.getElementById('prevBtn').disabled) previousCard();
        else if (e.key === 'ArrowRight' && !document.getElementById('nextBtn').disabled) nextCard();
        else if (e.key === 'Escape' && document.getElementById('cancelBtn').classList.contains('show')) cancelSelection();
    });

    loadQuestion();
</script>
